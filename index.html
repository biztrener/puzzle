<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Пазл великих людей</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:#0a1f0f;}
body{font-family:'Inter',sans-serif;overflow-x:hidden;}
.page{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:1rem;background:#0a1f0f;position:relative;overflow:hidden;}
.page.show{display:flex;}
canvas.bg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.z1{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;gap:0.75rem;max-width:580px;margin:0 auto;}

.hero{text-align:center;}
.hero-icon{font-size:30px;display:block;margin-bottom:0.3rem;animation:float 3.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#d1fae5;margin-bottom:2px;}
.hero p{font-size:11px;color:#34d399;letter-spacing:0.08em;text-transform:uppercase;}

.day-counter{background:rgba(20,83,45,0.5);border:1px solid rgba(52,211,153,0.3);border-radius:8px;padding:6px 14px;font-size:12px;color:#6ee7b7;text-align:center;width:100%;}
.day-counter span{color:#d1fae5;font-weight:600;}

.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;}
@media(max-width:400px){.grid{grid-template-columns:repeat(3,1fr);}}
.sphere-card{background:rgba(10,40,20,0.8);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:0.65rem 0.3rem;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all 0.18s;touch-action:manipulation;user-select:none;}
.sphere-card:hover{background:rgba(20,83,45,0.5);border-color:rgba(52,211,153,0.5);}
.sphere-card.done{border-color:rgba(110,231,183,0.6);background:rgba(4,52,44,0.5);cursor:default;}
.sphere-card.locked{opacity:0.35;cursor:not-allowed;}
.s-icon{font-size:18px;}.s-word{font-size:11px;font-weight:600;color:#d1fae5;text-align:center;}
.s-done{font-size:9px;color:#6ee7b7;display:none;}.sphere-card.done .s-done{display:block;}
.s-lock{font-size:9px;color:#34d399;display:none;}.sphere-card.locked .s-lock{display:block;}
.footer-hint{font-size:11px;color:#34d399;text-align:center;}

/* PUZZLE PAGE */
.back-btn{align-self:flex-start;background:transparent;border:1px solid rgba(52,211,153,0.35);color:#6ee7b7;padding:5px 14px;border-radius:999px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;touch-action:manipulation;}
.pz-badge{background:rgba(20,83,45,0.7);color:#d1fae5;border-radius:999px;padding:3px 14px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border:1px solid rgba(52,211,153,0.3);text-align:center;}
.pz-hint{font-size:11px;color:#6b7280;align-self:flex-start;}

/* Rotate hint for portrait mobile */
.rotate-hint{
  display:none;background:rgba(20,83,45,0.8);border:1px solid rgba(52,211,153,0.4);
  border-radius:10px;padding:10px 16px;font-size:12px;color:#6ee7b7;
  text-align:center;width:100%;
}
@media(max-width:600px) and (orientation:portrait){
  .rotate-hint{display:block;}
  .board-wrap{display:none;}
  .tray-section{display:none;}
  #progress{display:none;}
}
@media(min-width:601px),(orientation:landscape){
  .rotate-hint{display:none;}
}

.board-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:4px;
}
.board-wrap::-webkit-scrollbar{height:4px;}
.board-wrap::-webkit-scrollbar-track{background:rgba(52,211,153,0.1);border-radius:2px;}
.board-wrap::-webkit-scrollbar-thumb{background:rgba(52,211,153,0.4);border-radius:2px;}
.board{display:inline-grid;gap:2px;background:rgba(52,211,153,0.2);border-radius:7px;padding:2px;touch-action:none;}

.cell{background:rgba(10,40,20,0.8);border-radius:3px;transition:background 0.15s;position:relative;cursor:pointer;}
.cell.selected{background:rgba(52,211,153,0.2);}
.cell.selected canvas{outline:3px solid #34d399;border-radius:3px;transform:scale(1.06);transition:transform 0.1s;box-shadow:0 0 12px rgba(52,211,153,0.6);}
#touch-ghost{position:fixed;pointer-events:none;z-index:1000;display:none;border-radius:4px;border:2px solid #34d399;box-shadow:0 0 16px rgba(52,211,153,0.5);opacity:0.82;}
.cell.over{background:rgba(52,211,153,0.25);}
canvas.piece-cv{display:block;border-radius:3px;touch-action:none;user-select:none;pointer-events:none;}

.progress{font-size:11px;color:#6b7280;align-self:flex-start;}
.result-box{display:none;background:rgba(4,52,44,0.7);border-radius:10px;padding:0.8rem 1.25rem;border:1.5px solid #6ee7b7;text-align:center;width:100%;animation:pop 0.4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
.result-box.show{display:block;}
.result-text{font-size:13px;color:#6ee7b7;font-weight:500;margin-bottom:4px;}
.result-sub{font-size:11px;color:#34d399;}
.pz-reset{background:transparent;border:1px solid rgba(52,211,153,0.35);color:#6ee7b7;padding:5px 18px;border-radius:999px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;touch-action:manipulation;}
.pz-reset:hover{background:rgba(20,83,45,0.6);color:#d1fae5;}
</style>
</head>
<body>

<canvas id="touch-ghost"></canvas>
<div id="main-page" class="page show">
  <canvas class="bg" id="bg1"></canvas>
  <div class="z1">
    <div class="hero">
      <span class="hero-icon">🧩</span>
      <h1>Пазл великих людей</h1>
      <p>Выбери сферу — собери цитату</p>
    </div>
    <div class="day-counter">Сегодня собрано: <span id="done-count">0</span> из 3 пазлов</div>
    <div class="grid" id="sphere-grid"></div>
    <div class="footer-hint">Каждый день — 3 новых пазла на твой выбор ✦ 15 великих на 5 дней</div>
  </div>
</div>

<div id="puzzle-page" class="page">
  <canvas class="bg" id="bg2"></canvas>
  <div class="z1">
    <button class="back-btn" id="back-btn">← Все сферы</button>
    <div class="pz-badge" id="pz-badge"></div>

    <div class="rotate-hint">📱 Переверни телефон горизонтально — так удобнее собирать пазл!</div>

    <div class="pz-hint">Перетащи кусочки — поменяй местами</div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
    <div class="progress" id="progress"></div>
    <div class="result-box" id="result-box">
      <div style="font-size:18px;margin-bottom:4px">🎉</div>
      <div class="result-text" id="result-text"></div>
      <div class="result-sub" id="result-sub"></div>
    </div>
    <button class="pz-reset" id="pz-reset">Перемешать заново</button>
  </div>
</div>

<script>
const SPHERES=[
  {word:'Сеть',      icon:'🌐',person:'Марк Цукерберг',   role:'Основатель Facebook',      color:'#4f46e5',accent:'#818cf8'},
  {word:'Сила',      icon:'⚡',person:'Архимед',           role:'Математик и физик',         color:'#0f766e',accent:'#5eead4'},
  {word:'Риск',      icon:'🚀',person:'Илон Маск',         role:'Основатель Tesla и SpaceX', color:'#b45309',accent:'#fbbf24'},
  {word:'Время',     icon:'⏳',person:'Стив Джобс',        role:'Сооснователь Apple',        color:'#6d28d9',accent:'#a78bfa'},
  {word:'Деньги',    icon:'💰',person:'Уоррен Баффет',     role:'Легендарный инвестор',      color:'#065f46',accent:'#34d399'},
  {word:'Победа',    icon:'👑',person:'Наполеон',          role:'Французский полководец',    color:'#991b1b',accent:'#fca5a5'},
  {word:'Путь',      icon:'🌸',person:'Конфуций',          role:'Китайский философ',         color:'#9d174d',accent:'#f9a8d4'},
  {word:'Действие',  icon:'🎯',person:'Аристотель',        role:'Древнегреческий философ',   color:'#1e3a5f',accent:'#93c5fd'},
  {word:'Вера',      icon:'⚙️',person:'Генри Форд',        role:'Основатель Ford Motor',     color:'#374151',accent:'#9ca3af'},
  {word:'Слово',     icon:'🎖️',person:'Черчилль',          role:'Премьер-министр Британии',  color:'#78350f',accent:'#fcd34d'},
  {word:'Цель',      icon:'🐉',person:'Брюс Ли',           role:'Мастер боевых искусств',    color:'#14532d',accent:'#86efac'},
  {word:'Команда',   icon:'🏆',person:'Джек Уэлч',         role:'Легендарный CEO GE',        color:'#1e1b4b',accent:'#c7d2fe'},
  {word:'Прорыв',    icon:'💥',person:'Ричард Брэнсон',    role:'Основатель Virgin Group',   color:'#be123c',accent:'#fda4af'},
  {word:'Творчество',icon:'🎨',person:'Леонардо да Винчи', role:'Художник и учёный',         color:'#7c2d12',accent:'#fdba74'},
  {word:'Упорство',  icon:'🔥',person:'Томас Эдисон',      role:'Великий изобретатель',      color:'#713f12',accent:'#fde68a'},
];
const QUOTES=[
  {q:'Двигайся быстро и ломай устаревшее. Если ты ничего не ломаешь — значит, ты двигаешься недостаточно быстро.',tip:'Скорость диалога = больше активаций'},
  {q:'Дайте мне точку опоры, и я переверну весь мир.',tip:'Один правильный аргумент меняет всё'},
  {q:'Когда что-то достаточно важно — ты делаешь это, даже если шансы не на твоей стороне.',tip:'Каждый диалог — это шанс'},
  {q:'Оставайся голодным. Оставайся безрассудным.',tip:'Не останавливайся — следующая активация рядом'},
  {q:'Цена — это то, что ты платишь. Ценность — это то, что ты получаешь.',tip:'Объясни клиенту ценность — и он скажет да'},
  {q:'Невозможное — слово из словаря глупцов.',tip:'Любой клиент может стать активным'},
  {q:'Не важно, как медленно ты идёшь — главное, не останавливаться.',tip:'Каждый диалог приближает тебя к цели'},
  {q:'Мы есть то, что мы делаем постоянно. Совершенство — это не действие, а привычка.',tip:'Привычка к диалогам = стабильные активации'},
  {q:'Если думаешь, что можешь, или думаешь, что не можешь — ты в обоих случаях прав.',tip:'Уверенность в голосе слышна клиенту'},
  {q:'Успех — это способность идти от неудачи к неудаче, не теряя энтузиазма.',tip:'Отказ — не конец, это следующий диалог'},
  {q:'Не молись о лёгкой жизни. Молись о силе вынести трудную.',tip:'Сложный клиент — твой лучший тренер'},
  {q:'Прежде чем стать лидером, ты добиваешься успеха сам. Став лидером — помогаешь другим.',tip:'Помоги клиенту — и он вернётся снова'},
  {q:'К чёрту всё — берись и делай.',tip:'Не жди идеального момента — создай сделку сейчас'},
  {q:'Простота — это высшая степень изощрённости.',tip:'Объясни сложное просто — и клиент скажет да'},
  {q:'Я не терпел поражений. Я просто нашёл 10 000 способов, которые не работают.',tip:'Каждый отказ — шаг к следующей активации'},
];

const DAILY_LIMIT=3,N=12;
const isMobile=window.innerWidth<700||('ontouchstart' in window);
const COLS=isMobile?4:6;
const ROWS=isMobile?3:2;
// Piece size: desktop fits 6 pieces in ~660px, mobile fits 4 in screen width
const screenW=Math.min(window.innerWidth,700);
const CW=isMobile?Math.floor((screenW-32)/4):Math.floor((Math.min(window.innerWidth,760)-60)/6);
const CH=CW;
const TW=CW*COLS,TH=CH*ROWS;
const SKINS=['#e8c49a','#d4956a','#f0d0a8','#c8845a','#e0b88a','#d4956a','#e8c49a','#d4b896','#e8c49a','#e0c090','#d4956a','#e8c49a','#f0d0a8','#f0d8b0','#e8c49a'];
const HAIRS=['#4a2c10','#888','#5c3d1e','#1a1a1a','#888','#3a2a10','#1a1a1a','#888','#888','#c8a830','#1a1a1a','#2a2a2a','#c8a830','#5c3010','#888'];

function getToday(){return new Date().toDateString();}
function loadState(){
  try{
    const raw=localStorage.getItem('pzState4');
    if(!raw)return{date:getToday(),done:[],doneToday:0};
    const s=JSON.parse(raw);
    if(s.date!==getToday()){s.date=getToday();s.doneToday=0;}
    return s;
  }catch(e){return{date:getToday(),done:[],doneToday:0};}
}
function saveState(){try{localStorage.setItem('pzState4',JSON.stringify(state));}catch(e){}}

let state=loadState();
let currentSphere=-1;
// slots[i] = which piece sits at position i
let slots=[];
let pieceCanvases=[];
let selectedSlot=null; // for tap-to-swap
let dragIdx=null,dragFromSlot=null;
let touchDragging=false,touchDragFromSlot=null,touchDragIdx=null;

// Build main grid
const gridEl=document.getElementById('sphere-grid');
SPHERES.forEach((s,i)=>{
  const card=document.createElement('div');
  card.className='sphere-card';card.id='card-'+i;
  card.innerHTML=`<span class="s-icon">${s.icon}</span><span class="s-word">${s.word}</span><span class="s-done">✓</span><span class="s-lock">🔒</span>`;
  card.addEventListener('click',()=>clickSphere(i));
  card.addEventListener('touchend',e=>{e.preventDefault();clickSphere(i);});
  gridEl.appendChild(card);
});

document.getElementById('back-btn').addEventListener('click',goBack);
document.getElementById('back-btn').addEventListener('touchend',e=>{e.preventDefault();goBack();});
document.getElementById('pz-reset').addEventListener('click',initPuzzle);
document.getElementById('pz-reset').addEventListener('touchend',e=>{e.preventDefault();initPuzzle();});

updateMainUI();

function updateMainUI(){
  document.getElementById('done-count').textContent=state.doneToday;
  SPHERES.forEach((_,i)=>{
    const card=document.getElementById('card-'+i);
    card.classList.remove('done','locked');
    if(state.done.includes(i))card.classList.add('done');
    else if(state.doneToday>=DAILY_LIMIT)card.classList.add('locked');
  });
}
function clickSphere(i){
  if(state.done.includes(i)||state.doneToday>=DAILY_LIMIT)return;
  openPuzzle(i);
}
function openPuzzle(idx){
  currentSphere=idx;
  document.getElementById('main-page').classList.remove('show');
  document.getElementById('puzzle-page').classList.add('show');
  document.getElementById('pz-badge').textContent=SPHERES[idx].icon+' '+SPHERES[idx].word+' · '+SPHERES[idx].person;
  initPuzzle();window.scrollTo(0,0);
}
function goBack(){
  document.getElementById('puzzle-page').classList.remove('show');
  document.getElementById('main-page').classList.add('show');
  selectedSlot=null;updateMainUI();window.scrollTo(0,0);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' ');let line='',cy=y;
  for(const w of words){
    const t=line+w+' ';
    if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line.trim(),x,cy);line=w+' ';cy+=lineH;}
    else line=t;
  }
  if(line.trim()){ctx.fillText(line.trim(),x,cy);cy+=lineH;}
  return cy;
}

function drawPerson(ctx,idx,cx,cy){
  const s=SPHERES[idx],skin=SKINS[idx],hair=HAIRS[idx];
  ctx.fillStyle=hair;
  if([1,7].includes(idx)){
    ctx.fillStyle='#c8a830';roundRect(ctx,cx-28,cy-56,56,10,4);ctx.fill();
  } else if(idx===5){
    ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.ellipse(cx,cy-50,34,10,0,0,Math.PI*2);ctx.fill();ctx.fillRect(cx-34,cy-54,68,12);
  } else if(idx===6){
    ctx.fillStyle='#3a3a3a';roundRect(ctx,cx-26,cy-54,52,14,3);ctx.fill();
    ctx.fillStyle='#c8c8c8';ctx.beginPath();ctx.moveTo(cx-10,cy+8);ctx.quadraticCurveTo(cx,cy+26,cx+10,cy+8);ctx.fill();
  } else if(idx===12){
    ctx.fillStyle='#c8a830';ctx.beginPath();ctx.ellipse(cx,cy-46,30,16,0,0,Math.PI*2);ctx.fill();
    ctx.fillRect(cx-30,cy-48,60,16);
    ctx.beginPath();ctx.ellipse(cx-30,cy-36,10,14,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+30,cy-36,10,14,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d4b840';ctx.beginPath();ctx.ellipse(cx,cy+10,12,6,0,0,Math.PI);ctx.fill();
  } else if(idx===13){
    ctx.fillStyle='#5c3010';ctx.beginPath();ctx.ellipse(cx,cy-46,32,18,0,0,Math.PI*2);ctx.fill();
    ctx.fillRect(cx-32,cy-50,64,20);
    ctx.beginPath();ctx.ellipse(cx-32,cy-34,10,16,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+32,cy-34,10,16,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8a6040';ctx.beginPath();ctx.moveTo(cx-14,cy+4);ctx.quadraticCurveTo(cx,cy+32,cx+14,cy+4);ctx.fill();
  } else {
    ctx.fillStyle=hair;ctx.beginPath();ctx.ellipse(cx,cy-46,28,15,0,0,Math.PI*2);ctx.fill();
    ctx.fillRect(cx-28,cy-48,56,15);
    ctx.beginPath();ctx.ellipse(cx-28,cy-36,8,13,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+28,cy-36,8,13,0,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle=skin;ctx.beginPath();ctx.ellipse(cx,cy-10,28,34,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx-28,cy-8,5,7,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+28,cy-8,5,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hair;roundRect(ctx,cx-17,cy-20,12,2.5,1);ctx.fill();roundRect(ctx,cx+5,cy-20,12,2.5,1);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(cx-10,cy-12,6,5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+10,cy-12,6,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(cx-10,cy-12,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+10,cy-12,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(cx-8.5,cy-13.5,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+11.5,cy-13.5,1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=skin==='#e8c49a'?'#d4a870':'#b8785a';ctx.beginPath();ctx.ellipse(cx,cy-2,3,2.5,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#9b5e3a';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx-7,cy+6);ctx.quadraticCurveTo(cx,cy+11,cx+7,cy+6);ctx.stroke();
  ctx.fillStyle=skin;ctx.fillRect(cx-7,cy+20,14,16);
  if(idx===5){
    ctx.fillStyle='#1a3a6a';ctx.beginPath();ctx.ellipse(cx,cy+65,50,40,0,0,Math.PI*2);ctx.fill();ctx.fillRect(cx-50,cy+36,100,32);
    ctx.fillStyle='#c8a830';ctx.fillRect(cx-3,cy+34,6,28);
  } else if([1,6,7,13].includes(idx)){
    ctx.fillStyle=s.color+'cc';ctx.beginPath();ctx.ellipse(cx,cy+65,50,40,0,0,Math.PI*2);ctx.fill();ctx.fillRect(cx-50,cy+33,100,35);
  } else if(idx===10){
    ctx.fillStyle=skin;ctx.beginPath();ctx.ellipse(cx,cy+55,40,35,0,0,Math.PI*2);ctx.fill();ctx.fillRect(cx-40,cy+28,80,30);
    ctx.strokeStyle='#c8a830';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx-15,cy+32);ctx.lineTo(cx-15,cy+55);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+15,cy+32);ctx.lineTo(cx+15,cy+55);ctx.stroke();
  } else if(idx===12){
    ctx.fillStyle='#dc2626cc';ctx.beginPath();ctx.ellipse(cx,cy+65,50,40,0,0,Math.PI*2);ctx.fill();ctx.fillRect(cx-50,cy+33,100,35);
    ctx.fillStyle='white';ctx.beginPath();ctx.moveTo(cx-10,cy+34);ctx.lineTo(cx,cy+50);ctx.lineTo(cx+10,cy+34);ctx.closePath();ctx.fill();
  } else {
    ctx.fillStyle=s.color+'dd';ctx.beginPath();ctx.ellipse(cx,cy+65,50,40,0,0,Math.PI*2);ctx.fill();ctx.fillRect(cx-50,cy+33,100,35);
    ctx.fillStyle='white';ctx.beginPath();ctx.moveTo(cx-8,cy+34);ctx.lineTo(cx,cy+46);ctx.lineTo(cx+8,cy+34);ctx.closePath();ctx.fill();
    ctx.fillStyle=s.accent;ctx.beginPath();ctx.moveTo(cx-3,cy+36);ctx.lineTo(cx,cy+48);ctx.lineTo(cx+3,cy+36);ctx.closePath();ctx.fill();
  }
}

function drawCard(ctx,idx){
  const s=SPHERES[idx],q=QUOTES[idx],W=TW,H=TH;
  ctx.fillStyle='#0a1f0f';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(34,197,94,0.05)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.fillStyle=s.color;ctx.fillRect(0,0,W,4);
  const lw=Math.floor(TW*0.27);
  ctx.fillStyle=s.color+'77';roundRect(ctx,6,6,lw,H-12,6);ctx.fill();
  drawPerson(ctx,idx,lw/2+6,H*0.42);
  ctx.fillStyle=s.color+'cc';roundRect(ctx,10,H-54,lw-4,18,4);ctx.fill();
  ctx.fillStyle='#e8eaff';ctx.font='bold 11px Inter,sans-serif';ctx.textAlign='center';
  ctx.fillText(s.person.toUpperCase(),lw/2+6,H-42);
  ctx.fillStyle=s.accent;ctx.font='9px Inter,sans-serif';ctx.fillText(s.role,lw/2+6,H-28);
  ctx.fillStyle=s.accent+'88';ctx.font='italic 7px Inter,sans-serif';ctx.fillText(s.icon+' '+s.word,lw/2+6,H-14);
  const rx=lw+14;
  ctx.fillStyle=s.color+'55';ctx.fillRect(lw+8,0,2,H);
  ctx.textAlign='left';
  ctx.fillStyle=s.accent;ctx.font='italic bold 22px Cormorant Garamond,serif';ctx.fillText('"',rx,40);
  ctx.fillStyle='#e8eaff';ctx.font='italic bold 19px Cormorant Garamond,serif';
  const endY=wrapText(ctx,q.q,rx+8,56,TW-rx-16,25);
  ctx.strokeStyle=s.color+'55';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(rx,endY+4);ctx.lineTo(TW-10,endY+4);ctx.stroke();
  ctx.fillStyle=s.accent;ctx.font='500 13px Inter,sans-serif';ctx.fillText('— '+s.person,rx,endY+16);
  ctx.fillStyle=s.color+'cc';ctx.font='11px Inter,sans-serif';ctx.fillText(s.role,rx,endY+28);
  const tipY=endY+42;
  if(tipY+32<H){
    ctx.fillStyle=s.accent;roundRect(ctx,rx,tipY,TW-rx-10,32,5);ctx.fill();
    ctx.fillStyle='#0a1f0f';ctx.font='bold 12px Inter,sans-serif';
    ctx.fillText('💡 '+q.tip,rx+10,tipY+22);
  }
}

function initPuzzle(){
  const master=document.createElement('canvas');master.width=TW;master.height=TH;
  drawCard(master.getContext('2d'),currentSphere);
  pieceCanvases=Array.from({length:N},(_,i)=>{
    const col=i%COLS,row=Math.floor(i/COLS);
    const cv=document.createElement('canvas');cv.width=CW;cv.height=CH;
    cv.getContext('2d').drawImage(master,col*CW,row*CH,CW,CH,0,0,CW,CH);
    return cv;
  });
  // Shuffle: slots[position] = piece index
  const order=[...Array(N).keys()].sort(()=>Math.random()-0.5);
  // Make sure it's not already solved
  slots=order;
  if(slots.every((v,i)=>v===i)) slots=[...slots.slice(1),slots[0]];
  selectedSlot=null;
  document.getElementById('result-box').classList.remove('show');
  renderBoard();updateProgress();
}

function renderBoard(){
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${COLS},${CW}px)`;
  board.style.gridTemplateRows=`repeat(${ROWS},${CH}px)`;
  board.innerHTML='';
  for(let i=0;i<N;i++){
    const cell=document.createElement('div');
    cell.className='cell'+(selectedSlot===i?' selected':'');
    cell.dataset.slot=i;
    cell.style.width=CW+'px';cell.style.height=CH+'px';

    const cv=document.createElement('canvas');
    cv.width=CW;cv.height=CH;cv.className='piece-cv';
    cv.style.width=CW+'px';cv.style.height=CH+'px';
    cv.getContext('2d').drawImage(pieceCanvases[slots[i]],0,0);
    cell.appendChild(cv);

    // Click/tap to select then swap
    cell.addEventListener('click',()=>handleSelect(i));
    cell.addEventListener('touchend',e=>{e.preventDefault();handleSelect(i);});

    // Drag support (desktop)
    cell.draggable=true;
    cell.addEventListener('dragstart',e=>{
      dragIdx=slots[i];dragFromSlot=i;
      setTimeout(()=>cell.style.opacity='0.4',0);
      e.dataTransfer.effectAllowed='move';
    });
    cell.addEventListener('dragend',()=>{cell.style.opacity='1';});
    cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('over');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('over'));
    cell.addEventListener('drop',e=>{
      e.preventDefault();cell.classList.remove('over');
      if(dragFromSlot===null||dragFromSlot===i)return;
      swapSlots(dragFromSlot,i);
      dragIdx=null;dragFromSlot=null;
    });

    // Touch drag
    cell.addEventListener('touchstart',e=>{
      e.preventDefault();
      touchDragging=true;touchDragFromSlot=i;touchDragIdx=slots[i];
      const t=e.touches[0];
      const ghost=document.getElementById('touch-ghost');
      ghost.width=CW;ghost.height=CH;
      ghost.style.width=CW+'px';ghost.style.height=CH+'px';
      ghost.style.display='block';
      ghost.style.left=(t.clientX-CW/2)+'px';
      ghost.style.top=(t.clientY-CH/2)+'px';
      ghost.getContext('2d').drawImage(pieceCanvases[slots[i]],0,0);
      cell.style.opacity='0.35';
    },{passive:false});

    board.appendChild(cell);
  }
}

// Touch move/end for drag on mobile
document.addEventListener('touchmove',e=>{
  if(!touchDragging)return;
  e.preventDefault();
  const t=e.touches[0];
  const ghost=document.getElementById('touch-ghost');
  ghost.style.left=(t.clientX-CW/2)+'px';
  ghost.style.top=(t.clientY-CH/2)+'px';
  // Highlight cell under finger using getBoundingClientRect for accuracy
  document.querySelectorAll('.cell').forEach(c=>{
    c.classList.remove('over');
    const r=c.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      if(parseInt(c.dataset.slot)!==touchDragFromSlot) c.classList.add('over');
    }
  });
},{passive:false});

document.addEventListener('touchend',e=>{
  if(!touchDragging)return;
  e.preventDefault();
  const ghost=document.getElementById('touch-ghost');
  ghost.style.display='none';
  document.querySelectorAll('.cell').forEach(c=>{c.classList.remove('over');c.style.opacity='1';});

  const t=e.changedTouches[0];
  // Find target cell by checking all cells' bounding rects
  let targetCell=null;
  document.querySelectorAll('.cell').forEach(cell=>{
    const r=cell.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      targetCell=cell;
    }
  });

  if(targetCell){
    const targetSlot=parseInt(targetCell.dataset.slot);
    if(targetSlot!==touchDragFromSlot){
      swapSlots(touchDragFromSlot,targetSlot);
    }
  }
  touchDragging=false;touchDragFromSlot=null;touchDragIdx=null;
},{passive:false});

function handleSelect(i){
  if(selectedSlot===null){
    selectedSlot=i;
    renderBoard();
  } else if(selectedSlot===i){
    selectedSlot=null;
    renderBoard();
  } else {
    swapSlots(selectedSlot,i);
    selectedSlot=null;
  }
}

function swapSlots(a,b){
  [slots[a],slots[b]]=[slots[b],slots[a]];
  renderBoard();updateProgress();checkSolved();
}

function updateProgress(){
  const c=slots.filter((v,i)=>v===i).length;
  document.getElementById('progress').textContent=`Правильно: ${c} из ${N}`;
}

function checkSolved(){
  if(slots.every((v,i)=>v===i)){
    if(!state.done.includes(currentSphere)){
      state.done.push(currentSphere);state.doneToday++;saveState();
      document.getElementById('card-'+currentSphere).classList.add('done');
    }
    const s=SPHERES[currentSphere];
    document.getElementById('result-text').textContent='Пазл «'+s.word+'» собран! Цитата теперь твоя!';
    document.getElementById('result-sub').textContent='Сегодня: '+state.doneToday+' из '+DAILY_LIMIT+' ✦ Завтра откроются новые';
    setTimeout(()=>document.getElementById('result-box').classList.add('show'),300);
  }
}

function drawBg(cv){
  const ctx=cv.getContext('2d');
  const W=cv.width=cv.offsetWidth||580,H=cv.height=cv.offsetHeight||700;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a1f0f');g.addColorStop(0.5,'#0d2e18');g.addColorStop(1,'#061409');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(34,197,94,0.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=22){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  [[W*0.15,H*0.2,W*0.4,'rgba(34,197,94,0.07)'],[W*0.82,H*0.75,W*0.35,'rgba(20,120,50,0.07)'],[W*0.5,H*0.5,W*0.3,'rgba(52,211,153,0.04)']].forEach(([cx,cy,r,col])=>{
    const g2=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g2.addColorStop(0,col);g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
  });
  for(let i=0;i<60;i++){
    ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*0.7+0.2,0,Math.PI*2);
    ctx.fillStyle=`rgba(150,255,150,${Math.random()*0.25+0.05})`;ctx.fill();
  }
}
function initBg(id){
  const cv=document.getElementById(id);if(!cv)return;
  drawBg(cv);
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const flies=Array.from({length:25},()=>({x:Math.random()*W,y:Math.random()*H,a:Math.random()*0.3,da:(Math.random()-0.5)*0.015}));
  (function tick(){
    flies.forEach(f=>{
      f.a+=f.da;if(f.a>0.35||f.a<0)f.da*=-1;
      ctx.beginPath();ctx.arc(f.x,f.y,0.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(150,255,150,${Math.max(0,f.a)})`;ctx.fill();
    });
    requestAnimationFrame(tick);
  })();
}
initBg('bg1');initBg('bg2');
</script>
